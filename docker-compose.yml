services:
    # PHP Service
    php:
        build:
            context: .
            dockerfile: .docker/php/Dockerfile
        image: lkm-php
        container_name: lkm-php
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www:z
        networks:
            - lkm-network
            - web-network

    # Nginx Service
    nginx:
        image: nginx:alpine
        container_name: lkm-nginx
        restart: unless-stopped
        ports:
            - "8004:80"
        volumes:
            - ./:/var/www:z
            - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:z
        networks:
            - lkm-network
            - web-network
        depends_on:
            - php

    # Redis Service
    redis:
        image: redis:alpine
        container_name: lkm-redis
        restart: unless-stopped
        networks:
            - lkm-network
            - web-network

networks:
    lkm-network:
        driver: bridge
    web-network:
        external: true

volumes:
    php_framework_cache:
        driver: local
    php_bootstrap_cache:
        driver: local
